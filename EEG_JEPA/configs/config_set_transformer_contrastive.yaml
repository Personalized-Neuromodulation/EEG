# model config
seed: 42
model: 'SetTransformer'
in_channels: 1
batch_size: 32
sampling_duration: 300   #预训练用5分钟，
sampling_freq: 128
patch_size: 256
num_patches: 150 #微调时根据输入改变

epochs: 50
lr: 0.001
lr_step_period: 2
gamma: 0.1
temperature: 0.0
momentum: 0.9
num_workers: 16
embed_dim: 2048
num_heads: 8
num_layers: 12
pooling_head: 8
dropout: 0.3
latent_dim: 2048
# after the preprocessing step, make sure to point this to your data folder
#data_path: '/mnt/DATA/poolab/jepa_dataset/shhs2_h5'  watch -n 0.5 nvidia-smi    watch -n 0.5 nvidia-smi
data_path: '/mnt/DATA/poolab/jepa_dataset/combine'
split_path: '/mnt/DATA/poolab/jepa_dataset/EEG_JEPA/configs/dataset_split.json'
save_path: '/mnt/DATA/poolab/jepa_dataset/EEG_JEPA/checkpoints'
weight_decay: 0.01

# contrastive learning objective you want. pairwise vs. leave_one_out
mode: "cos_loss_30s"
save_iter: 5000
eval_iter: 5000
log_interval: 100
use_wandb: false

# dataloader configs

# specify some specific count for max_files during debuggin. null if you want to run it for all dataset
max_files: null
val_size: 100


# modalities you want to train on. Select at least one
modality_types: ["BAS","EKG", "EMG"]

